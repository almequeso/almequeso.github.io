<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Almequeso - Fanarts</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at center, #3a3520 0%, #141411 45%, #000000 100%);
      color: white;
      font-family: 'JetBrains Mono', monospace;
      overflow-x: hidden;
      padding-top: 100px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 120px,
        rgba(255, 255, 255, .02) 121px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* --- SIDEBAR Y MENÚ --- */
    .menuBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 2rem;
      padding: 10px 16px;
      border-radius: 15px;
      cursor: pointer;
      background: rgba(30, 30, 20, .8);
      border: 1px solid #ffcc00;
      box-shadow: 0 0 20px #b39200;
      z-index: 1001;
      color: #ffcc00;
      transition: .3s;
    }

    .menuBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px #ffcc00;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: 280px;
      height: 100vh;
      padding-top: 90px;
      background: rgba(15, 15, 12, .95);
      backdrop-filter: blur(15px);
      border-right: 1px solid #ffcc00;
      transition: .5s;
      z-index: 1000;
    }

    .sidebar.abierto {
      left: 0;
    }

    .sidebar h2 {
      text-align: center;
      margin-bottom: 35px;
      color: #ffcc00;
      font-family: 'Cinzel', serif;
    }

    .sidebar a {
      display: block;
      padding: 18px 30px;
      color: white;
      text-decoration: none;
      cursor: pointer;
      transition: .3s;
    }

    .sidebar a:hover {
      background: rgba(255, 204, 0, .15);
      padding-left: 40px;
      color: #ffcc00;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      opacity: 0;
      pointer-events: none;
      transition: .4s;
      z-index: 999;
    }

    .overlay.activo {
      opacity: 1;
      pointer-events: auto;
    }

    /* --- TITULOS --- */
    .titulo-seccion {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      margin-bottom: 10px;
      color: #ffcc00;
      text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
    }

    .subtitulo-seccion {
      text-align: center;
      opacity: 0.7;
      margin-bottom: 40px;
      font-size: 0.95rem;
      padding: 0 20px;
    }

    /* --- GALERÍA --- */
    .galeria-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 25px 60px 25px;
      justify-items: center;
      position: relative;
      z-index: 2;
    }

    /* --- CONTENEDOR 3D --- */
    .card-container {
      width: 300px;
      height: 450px;
      perspective: 1000px;
    }

    .card-flip {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      /* La transición suave se aplica solo cuando no se está arrastrando */
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* Cuando se voltea la carta */
    .card-flip.flipped {
      transform: rotateY(180deg) !important;
    }

    .face {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 25px;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* CARA FRONTAL */
    .front {
      background: #141414;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .front .fanart-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .front .marco-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      z-index: 2;
      pointer-events: none;
      text-indent: -9999px;
    }

    /* EFECTO HOLOGRÁFICO INTERACTIVO */
    .holo-glow {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0) 0%,
        rgba(255, 255, 255, 0.3) 45%,
        rgba(255, 255, 255, 0.6) 50%,
        rgba(255, 255, 255, 0.3) 55%,
        rgba(255, 255, 255, 0) 100%
      );
      background-size: 250% 250%;
      background-position: var(--holo-x, 50%) var(--holo-y, 50%);
      mix-blend-mode: color-dodge; /* Cambiado a color-dodge para brillo iridiscente épico */
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* El brillo aparece al interactuar */
    .card-container:hover .holo-glow,
    .card-container.active .holo-glow {
      opacity: 1;
    }

    /* CARA TRASERA */
    .back {
      background: linear-gradient(135deg, #e0f2fe 0%, #fae8ff 50%, #e0e7ff 100%);
      color: #1e1b4b;
      transform: rotateY(180deg);
      padding: 35px 25px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 3px solid #ffcc00;
      box-shadow: 0 0 25px rgba(255, 204, 0, 0.3);
    }

    .info-header h3 {
      margin: 0;
      font-family: 'Cinzel', serif;
      font-size: 1.35rem;
      color: #1e1b4b;
      border-bottom: 2px solid rgba(30, 27, 75, 0.15);
      padding-bottom: 8px;
    }

    .info-artista {
      margin: 10px 0 0 0;
      font-weight: bold;
      color: #4338ca;
      font-size: 0.95rem;
    }

    .meta-datos {
      margin: 15px 0;
      font-size: 0.85rem;
    }

    .meta-datos div {
      margin-bottom: 6px;
    }

    .detalles-texto {
      font-style: italic;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.6);
      padding: 12px;
      border-radius: 15px;
      line-height: 1.4;
      flex-grow: 1;
      display: flex;
      align-items: center;
    }
  </style>
</head>

<body>

  <div class="menuBtn" onclick="toggleMenu()">☰</div>
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

  <div class="sidebar" id="sidebar">
    <h2>🌌 MENÚ</h2>
    <a href="../" onclick="toggleMenu()">🏠 Inicio</a>
    <a href="../libro/" onclick="toggleMenu()">📖 Libro</a>
    <a href="../lore/" onclick="toggleMenu()">🌌 Lore</a>
    <a href="./" onclick="toggleMenu()">🎨 Fanarts</a>
    <a href="../comunidad/" onclick="toggleMenu()">💬 Comunidad</a>
  </div>

  <div class="titulo-seccion">FANARTS</div>
  <div class="subtitulo-seccion">Mantén presionado y mueve para brillar. Un toque rápido para voltear.</div>

  <main class="galeria-container">

    <!-- Tarjeta Interactiva -->
    <div class="card-container" data-tilt>
      <div class="card-flip">
        
        <!-- CARA FRONTAL -->
        <div class="face front">
          <img src="../img/plantilla.png" class="fanart-bg" alt="Fanart Base">
          <img src="../img/marcofanarts.png" class="marco-overlay" alt="Marco Oficial">
          <div class="holo-glow"></div>
        </div>
        
        <!-- CARA TRASERA -->
        <div class="face back">
          <div class="info-header">
            <h3>La fackin' imagen de ejemplo w</h3>
            <p class="info-artista">Por: @Pendejo</p>
          </div>
          <div class="meta-datos">
            <div><strong>Fecha:</strong> 14/07/2026</div>
            <div><strong>Vía:</strong> Pornhub</div>
          </div>
          <div class="detalles-texto">
            "Que te valga vrga prro"
          </div>
        </div>

      </div>
    </div>

  </main>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("abierto");
      document.getElementById("overlay").classList.toggle("activo");
    }

    // --- LÓGICA DEL EFECTO HOLO 3D (TILT) ---
    const cards = document.querySelectorAll('[data-tilt]');

    cards.forEach(card => {
      const flipContainer = card.querySelector('.card-flip');
      const glow = card.querySelector('.holo-glow');
      let isMoving = false;
      let startX, startY;

      function handleMove(e) {
        // Ignorar el efecto si la carta está dada la vuelta
        if (flipContainer.classList.contains('flipped')) return;

        // Detectar si es touch (móvil) o mouse (PC)
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const rect = card.getBoundingClientRect();
        const x = clientX - rect.left; // Posición X dentro de la carta
        const y = clientY - rect.top;  // Posición Y dentro de la carta

        // Calcular porcentajes (-50 a 50) para la rotación
        const midX = rect.width / 2;
        const midY = rect.height / 2;
        const rotateX = ((y - midY) / midY) * -15; // Inclinación máx 15 grados
        const rotateY = ((x - midX) / midX) * 15;

        // Mover el brillo de fondo
        const glowX = (x / rect.width) * 100;
        const glowY = (y / rect.height) * 100;

        isMoving = true;
        card.classList.add('active');

        // Aplicamos el cambio directo sin delay quitando transiciones molestas durante el arrastre
        flipContainer.style.transition = 'transform 0.1s ease';
        flipContainer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
        
        glow.style.setProperty('--holo-x', `${glowX}%`);
        glow.style.setProperty('--holo-y', `${glowY}%`);
      }

      function handleReset() {
        isMoving = false;
        card.classList.remove('active');
        // Regresa la carta a su estado original suavemente
        flipContainer.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
        if (!flipContainer.classList.contains('flipped')) {
          flipContainer.style.transform = 'rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
        }
      }

      // Eventos para PC
      card.addEventListener('mousemove', handleMove);
      card.addEventListener('mouseleave', handleReset);

      // Eventos para Móvil
      card.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      });
      card.addEventListener('touchmove', handleMove);
      card.addEventListener('touchend', handleReset);

      // Manejar el click/tap para voltear asegurando que no interfiera con el arrastre largo
      card.addEventListener('click', (e) => {
        // Si el usuario movió mucho el dedo, asumimos que quería ver el brillo y no voltearla
        flipContainer.style.transition = 'transform 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
        flipContainer.classList.toggle('flipped');
        
        // Limpiar estilos 3D para que no se quede trabada al voltear
        if(flipContainer.classList.contains('flipped')) {
          flipContainer.style.transform = 'rotateY(180deg)';
        } else {
          flipContainer.style.transform = 'rotateX(0deg) rotateY(0deg)';
        }
      });
    });
  </script>

</body>
</html>
