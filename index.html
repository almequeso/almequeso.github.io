<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Almequeso</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:
    radial-gradient(circle at center,#2d0050 0%,#0b0015 45%,#000 100%);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
    font-family:'JetBrains Mono', monospace;

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 120px,
        rgba(180,0,255,0.05) 121px
    );
    pointer-events:none;
}

.card{
    width:min(90%,500px);

    text-align:center;

    padding:40px 20px;

    backdrop-filter:blur(10px);

    background:rgba(10,0,20,.55);

    border:1px solid #b100ff;

    border-radius:30px;

    box-shadow:
    0 0 20px #9500ff,
    0 0 60px rgba(140,0,255,.5);
}

.pfp{

    width:190px;
    height:190px;

    object-fit:cover;

    border-radius:50%;

    border:4px solid #c04cff;

    box-shadow:
    0 0 25px #c04cff,
    0 0 70px #7000ff;

    transition:.5s;
}

.pfp:hover{
    transform:scale(1.05);
}

.nombre{
    margin-top:25px;

    font-size:3rem;

    font-family:'Cinzel',serif;

    cursor:pointer;

    text-shadow:
    0 0 10px #bb00ff,
    0 0 30px #bb00ff;
}

.sub{

    opacity:.8;
    margin-top:10px;
}

.boton{

    margin-top:30px;

    background:#200030;

    border:1px solid #d17fff;

    color:white;

    padding:15px;

    border-radius:20px;

    cursor:pointer;

    transition:.3s;

    font-size:1rem;
}

.boton:hover{
    box-shadow:0 0 20px #bb00ff;
}

.redes{

    margin-top:15px;

    display:none;

    flex-direction:column;

    gap:12px;
}

.redes a{

    text-decoration:none;

    color:white;

    padding:12px;

    border:1px solid #6e00aa;

    border-radius:15px;

    background:rgba(255,255,255,.03);

    transition:.3s;
}

.redes a:hover{
    transform:scale(1.05);

    box-shadow:0 0 15px #bb00ff;
}

.frase{

    margin-top:35px;

    opacity:.7;
    font-style:italic;
}

</style>
</head>

<body>

<div class="card">

<img src="burro.png" class="pfp">

<div class="nombre" id="nombre">

Queso

</div>

<div class="sub">

✞ Neon Cathedral ✞

</div>

<div class="boton" onclick="abrirRedes()">

✦ REDES SOCIALES ✦

</div>

<div class="redes" id="redes">

<a href="https://instagram.com/">Instagram</a>

<a href="https://discord.com/">Discord</a>

<a href="https://youtube.com/">YouTube</a>

<a href="https://github.com/">GitHub</a>

<a href="https://spotify.com/">Spotify</a>

</div>

<div class="frase">

"Entre catedrales de neón y estrellas, continúa la historia."

</div>

</div>

<script>

const nombres=[

"Queso",
"Almequeso",
"Queso de chaqueta cool",
"Queso de yupi",
"Negas",
"Broly",
"Kasumi"

];

let i=0;

document.getElementById("nombre")
.onclick=()=>{

    i++;

    if(i>=nombres.length)
        i=0;

    document.getElementById("nombre")
    .innerText=nombres[i];

};

function abrirRedes(){

    const r=document.getElementById("redes");

    if(r.style.display==="flex")
        r.style.display="none";
    else
        r.style.display="flex";
}

</script>

</body>
</html>
