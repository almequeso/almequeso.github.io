<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lore — Archivo CSGI</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=JetBrains+Mono&display=swap"
rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

min-height:100vh;

padding:50px 20px;

font-family:'JetBrains Mono',monospace;

background:
radial-gradient(
circle at center,
#4a3200,
#120b00,
#000
);

color:white;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

inset:0;

background:
repeating-linear-gradient(
90deg,
transparent,
transparent 120px,
rgba(255,220,120,.04)
121px
);

pointer-events:none;

}

/* TÍTULO */

.titulo{

text-align:center;

font-size:3rem;

font-family:'Cinzel',serif;

color:#ffe38c;

text-shadow:

0 0 15px #ffd700,
0 0 45px rgba(255,215,0,.6);

}

.sub{

text-align:center;

margin-top:15px;

opacity:.8;

line-height:1.7;

}

/* ESTANTERÍA */

.estanteria{

width:min(1200px,95%);

margin:auto;

margin-top:70px;

display:flex;
flex-direction:column;

gap:60px;

}

/* REPISAS */

.repisa{

display:flex;

justify-content:center;
flex-wrap:wrap;

gap:35px;

position:relative;

padding-bottom:45px;

}

.repisa::after{

content:"";

position:absolute;

bottom:0;
left:0;

width:100%;
height:20px;

border-radius:15px;

background:

linear-gradient(
to bottom,
#6b4519,
#2c1707
);

box-shadow:

0 12px 25px rgba(0,0,0,.6);

}

/* BINDERS */

.binder{

position:relative;

width:700px;
height:210px;

display:flex;

align-items:center;
justify-content:center;

text-decoration:none;

transition:.45s;

overflow:visible;

flex-shrink:0;

}

.binder img{

position:absolute;

inset:0;

width:100%;
height:100%;

object-fit:contain;

display:block;

filter:
drop-shadow(
0 0 20px rgba(255,215,0,.25)
);

pointer-events:none;

}

.binder:hover{

transform:
translateY(-10px)
scale(1.04);

}
  

/* LED */

.luz{

position:absolute;

left:56px;
top:50%;

transform:
translateY(-50%);

width:30px;
height:30px;

border-radius:50%;

animation:
parpadeo 2s infinite;

}

/* TEXTO */

.texto{

position:absolute;

left:145px;
top:50%;

transform:
translateY(-50%);

font-family:'Cinzel',serif;

font-size:1.4rem;

letter-spacing:3px;

color:#fff5c8;

text-shadow:

0 0 12px #ffd700,
0 0 35px #ffd700;

}

/* COLORES */

.cronologia .luz{

background:#ffd700;

box-shadow:

0 0 20px #ffd700,
0 0 60px #ffd700;

}

.conceptos .luz{

background:#00d5ff;

box-shadow:

0 0 20px #00d5ff,
0 0 60px #00d5ff;

}

.especies .luz{

background:#44ff77;

box-shadow:

0 0 20px #44ff77,
0 0 60px #44ff77;

}

.facciones .luz{

background:#ff9b30;

box-shadow:

0 0 20px #ff9b30,
0 0 60px #ff9b30;

}

.lugares .luz{

background:#b44cff;

box-shadow:

0 0 20px #b44cff,
0 0 60px #b44cff;

}

.teorias .luz{

background:white;

box-shadow:

0 0 20px white,
0 0 60px white;

}

.archivos .luz{

background:#ff4444;

box-shadow:

0 0 20px #ff4444,
0 0 70px #ff0000;

animation:
rojo 1.2s infinite;

}

/* ANIMACIONES */

@keyframes parpadeo{

0%,100%{

opacity:.65;

}

50%{

opacity:1;

}

}

@keyframes rojo{

0%,100%{

opacity:.35;

}

50%{

opacity:1;

}

}

.frase{

margin-top:80px;

text-align:center;

opacity:.55;

font-style:italic;

}

@media(max-width:900px){

.binder{

width:95%;
height:150px;

}

.texto{

left:34%;

font-size:1rem;

}

}

</style>

</head>

<body>

<h1 class="titulo">

🌌 ARCHIVOS DE LORE

</h1>

<div class="sub">

Seleccione un expediente para acceder
a los registros de la CSGI.

</div>

<div class="estanteria">


<div class="repisa">

<a href="./cronologia/"
class="binder cronologia">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

📜 CRONOLOGÍA

</div>

</a>


<a href="./conceptos/"
class="binder conceptos">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

🧬 CONCEPTOS

</div>

</a>

</div>



<div class="repisa">

<a href="./especies/"
class="binder especies">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

👁 ESPECIES

</div>

</a>


<a href="./facciones/"
class="binder facciones">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

🏢 FACCIONES

</div>

</a>

</div>



<div class="repisa">

<a href="./lugares/"
class="binder lugares">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

🌍 LUGARES

</div>

</a>


<a href="./teorias/"
class="binder teorias">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

❓ TEORÍAS

</div>

</a>

</div>



<div class="repisa">

<a href="./archivosespeciales/"
class="binder archivos">

<img src="/img/blinder.png">

<div class="luz"></div>

<div class="texto">

🔒 ARCHIVOS ESPECIALES

</div>

</a>

</div>

</div>


<div class="frase">

"Algunos registros permanecen sellados por orden superior."

</div>

</body>
</html>
