<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Lore — Archivo CSGI</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=JetBrains+Mono&display=swap"
rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
min-height:100vh;
padding:50px 20px;

background:
radial-gradient(circle at center,
#4a3200 0%,
#120b00 45%,
#000 100%);

color:white;

font-family:'JetBrains Mono',monospace;

overflow-x:hidden;

}

body::before{

content:"";

position:fixed;
inset:0;

background:
repeating-linear-gradient(
90deg,
transparent,
transparent 140px,
rgba(255,220,120,.04) 141px
);

pointer-events:none;

}

/* TÍTULO */

.titulo{

text-align:center;

font-family:'Cinzel',serif;

font-size:3rem;

color:#ffe38c;

text-shadow:
0 0 15px #ffd700,
0 0 45px rgba(255,215,0,.6);

}

.sub{

text-align:center;

opacity:.8;

margin-top:15px;

line-height:1.7;

}

/* LIBRERO */

.estanteria{

width:min(1100px,95%);
margin:auto;

margin-top:60px;

display:flex;
flex-direction:column;
gap:60px;

}

/* TABLAS DE MADERA */

.repisa{

position:relative;

padding-top:10px;

display:flex;
flex-wrap:wrap;
justify-content:center;

gap:25px;

}

.repisa::after{

content:"";

position:absolute;

bottom:-25px;
left:0;

width:100%;
height:18px;

border-radius:10px;

background:
linear-gradient(
to bottom,
#6e4b1f,
#3a230b
);

box-shadow:
0 15px 30px rgba(0,0,0,.6);

}

/* EXPEDIENTES */

.folder{

width:250px;
height:120px;

position:relative;

text-decoration:none;

display:flex;
align-items:center;

padding-left:35px;

border-radius:12px;

background:

linear-gradient(
145deg,
rgba(255,230,150,.25),
rgba(120,80,20,.35)
);

border:1px solid #ffd700;

box-shadow:

0 0 20px rgba(255,215,0,.25);

transition:.4s;

overflow:hidden;

}

/* pestaña superior */

.folder::before{

content:"";

position:absolute;

top:-15px;
left:25px;

width:90px;
height:30px;

border-radius:10px 10px 0 0;

background:

linear-gradient(
145deg,
#a87b1b,
#e8c84f
);

border:

1px solid #ffd700;

}

/* anillos metálicos */

.folder::after{

content:"◉ ◉ ◉";

position:absolute;

left:12px;

font-size:1.2rem;

color:#d7d7d7;

text-shadow:
0 0 5px white;

}

.folder:hover{

transform:

translateY(-8px)
scale(1.03);

box-shadow:

0 0 35px rgba(255,215,0,.65);

}

.nombre{

margin-left:25px;

font-size:1.2rem;

font-family:'Cinzel',serif;

color:#fff4be;

text-shadow:
0 0 12px #ffd700;

}

/* brillo */

.folder:hover .nombre{

animation:brillo 2s infinite;

}

@keyframes brillo{

0%,100%{

text-shadow:
0 0 10px #ffd700;

}

50%{

text-shadow:

0 0 25px #fff3a1,
0 0 45px #ffd700;

}

}

.frase{

text-align:center;

margin-top:70px;

opacity:.55;

font-style:italic;

}

</style>
</head>

<body>

<h1 class="titulo">

🌌 ARCHIVO DE LORE

</h1>

<div class="sub">

Base de datos histórica y conceptual
de la CSGI.

Seleccione un expediente.

</div>

<a href="./cronologia/"
class="folder">

<div class="nombre">

</div>

</a>

<a href="./conceptos/"
class="folder">

<div class="nombre">

🧬 Conceptos

</div>

</a>

<a href="./especies/"
class="folder">

<div class="nombre">

👁 Especies

</div>

</a>

</div>


<div class="repisa">

<a href="./facciones/"
class="folder">

<div class="nombre">

🏢 Facciones

</div>

</a>

<a href="./lugares/"
class="folder">

<div class="nombre">

🌍 Lugares

</div>

</a>

<a href="./teorias/"
class="folder">

<div class="nombre">

❓ Teorías

</div>

</a>

</div>


<div class="repisa">

<a href="./archivosespeciales/"
class="folder">

<div class="nombre">

</div>

</a>

</div>

</div>

<div class="frase">
